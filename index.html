<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" href="./favicon.png">
<title>おくすり管理</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #f5f5f5;
    transition: background-color 0.8s ease, color 0.8s ease;
  }

  header {
    padding: 30px;
    background: #ffffff;
    text-align: center;
    font-size: 54px;
    font-weight: bold;
    border-bottom: 1px solid #ddd;
    transition: background-color 0.8s ease, color 0.8s ease;
  }

  nav {
    display: flex;
    background: #ffffff;
    border-bottom: 1px solid #ddd;
    transition: background-color 0.8s ease, color 0.8s ease;
  }

  nav button {
    flex: 1;
    padding: 24px;
    font-size: 42px;
    border: none;
    background: none;
    font-weight: bold;
    color: #2196F3;
    transition: background-color 0.8s ease, color 0.8s ease;
  }

  nav button.active {
    background: #d0d0d0;
  }

  main {
    padding: 30px;
  }

  #date {
    font-size: 50px;
    margin: 16px;
  }

  h2 {
    text-align: center;
    font-size: 24px;
  }

  .medicine {
    display: flex;
    align-items: center;
    padding: 32px;
    margin-bottom: 20px;
    background: #ffffff;
    border-radius: 8px;
    font-size: 42px;
    cursor: pointer;
    transition: background-color 0.8s ease,
                color 0.8s ease,
                opacity 0.4s ease;
  }

  .medicine.taken {
    opacity: 0.5;
  }

  .check {
    width: 40px;
    height: 40px;
    min-width: 40px;
    margin-right: 12px;
    border-radius: 50%;
    border: 2px solid #666;
    background: #fff;
    transition: background-color 0.8s ease,
                border-color 0.8s ease;
  }

  .medicine.taken .check {
    background: #4caf50;
    border-color: #4caf50;
  }

  /* ナイトテーマ */
  body.night-theme {
    background: #121212;
    color: #ffffff;
  }

  body.night-theme header,
  body.night-theme nav,
  body.night-theme .medicine {
    background: #1e1e1e;
    color: #ffffff;
  }

  body.night-theme nav {
    border-bottom: 1px solid #444;
  }

  body.night-theme header {
    border-bottom: 1px solid #444;
  }

  body.night-theme .medicine {
    border: 1px solid #333;
  }

  body.night-theme .check {
    border-color: #bbb;
    background: #222;
  }

  body.night-theme nav button {
    color: #90caf9;
  }

  body.night-theme nav button.active {
    background: #333;
  }

  /* ランプフェード */
  body.lamp-fade {
    background: #8f8676;
    color: #ffffff;
  }

  body.lamp-fade header,
  body.lamp-fade nav,
  body.lamp-fade .medicine {
    background: #8f8676;
    color: #ffffff;
    border-color: #8f8676;
  }

  body.lamp-fade nav button {
    background: #8f8676;
    color: #ffffff;
  }

  body.lamp-fade .check {
    background: #8f8676;
    border-color: #ffffff;
  }
</style>
</head>

<body>

<header>
  💊 おくすり<br>管理
  <div id="date"></div>
</header>

<nav>
  <button id="btn-morning" onclick="showPage('morning')">朝</button>
  <button id="btn-night" onclick="showPage('night')">夜</button>
</nav>

<main id="list"></main>

<h2>
  服薬状況は毎日リセットされるので安心してください。
</h2>

<script>
/* ===== 音声 ===== */
function speak(text) {
  if (!("speechSynthesis" in window)) return;

  speechSynthesis.cancel();

  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "ja-JP";
  msg.rate = 0.9;
  msg.pitch = 1.0;
  msg.volume = 1.0;

  speechSynthesis.speak(msg);
}

/* ===== データ ===== */
const medicines = [
  { id: "jumura_morning",       name: "ツムラ潤腸湯（食前）", timing: "morning", order: 1, taken: false },
  { id: "wasoran_morning",      name: "ワソラン錠",           timing: "morning", order: 2, taken: false },
  { id: "eldecalcitol_morning", name: "エルデカルシトール",   timing: "morning", order: 3, taken: false },
  { id: "lixiana_morning",      name: "リクシアナ錠",         timing: "morning", order: 4, taken: false },
  { id: "lanilapis_morning",    name: "ラニラピッド錠",       timing: "morning", order: 5, taken: false },
  { id: "wasoran_night",        name: "ワソラン錠",           timing: "night",   order: 1, taken: false },
  { id: "jumura_night",         name: "ツムラ潤腸湯（食前）", timing: "night",   order: 2, taken: false }
];

/* ===== 状況読み上げ ===== */
function announceStatus() {
  const timing = new Date().getHours() < 15 ? "morning" : "night";

  const morningRemaining = medicines.filter(m => m.timing === "morning" && !m.taken);
  const nightRemaining   = medicines.filter(m => m.timing === "night"   && !m.taken);
  const allDone = morningRemaining.length === 0 && nightRemaining.length === 0;

  if (timing === "morning") {
    if (morningRemaining.length > 0) {
      const names = morningRemaining.map(m => m.name).join("、");
      speak(`おはようございます。${names}を飲んでいません。`);
    } else {
      speak("今日の朝のおくすりは全部飲みました。");
    }
  } else {
    if (allDone) {
      speak("今日のおくすりは全部飲みました。お疲れ様でした。");
    } else if (nightRemaining.length > 0) {
      const names = nightRemaining.map(m => m.name).join("、");
      speak(`夜のおくすりの時間です。${names}を飲んでいません。`);
    } else {
      speak("今日の夜のおくすりは全部飲みました。");
    }
  }
}

/* ===== 日付 ===== */
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}

document.getElementById("date").textContent = today();

/* ===== 保存・読み込み ===== */
const saved = localStorage.getItem("medicines");
if (saved) {
  const data = JSON.parse(saved);
  medicines.forEach(m => {
    const s = data.find(x => x.id === m.id);
    if (s) m.taken = s.taken;
  });
}

function save() {
  localStorage.setItem("medicines", JSON.stringify(medicines));
}

/* ===== 毎日リセット ===== */
function dailyReset() {
  const lastDate = localStorage.getItem("lastDate");

  if (lastDate !== today()) {
    medicines.forEach(m => m.taken = false);
    localStorage.setItem("lastDate", today());
    save();
  }
}

dailyReset();

/* ===== 表示 ===== */
let current = "morning";

function buildList(timing) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  medicines
    .filter(m => m.timing === timing)
    .sort((a, b) => a.order - b.order)
    .forEach(m => {
      const div = document.createElement("div");
      div.className = "medicine" + (m.taken ? " taken" : "");
      div.dataset.id = m.id;
      div.innerHTML = `
        <div class="check"></div>
        <div>${m.name}</div>
      `;
      div.onclick = () => {
        m.taken = !m.taken;
        save();
        speak(m.taken ? `${m.name}を飲みました` : `${m.name}のチェックを外しました`);
        updateList(current);
      };
      list.appendChild(div);
    });
}

function updateList(timing) {
  medicines
    .filter(m => m.timing === timing)
    .forEach(m => {
      const div = document.querySelector(`.medicine[data-id="${m.id}"]`);
      if (div) div.classList.toggle("taken", m.taken);
    });
}

function showPage(timing, animate = true) {
  if (timing === current && animate) return;
  current = timing;

  if (animate) {
    applyTheme(timing);
  } else {
    document.body.classList.toggle("night-theme", timing === "night");
  }

  document.getElementById("btn-morning").classList.toggle("active", timing === "morning");
  document.getElementById("btn-night").classList.toggle("active", timing === "night");

  buildList(timing);
}

function applyTheme(timing) {
  document.body.classList.add("lamp-fade");

  setTimeout(() => {
    document.body.classList.toggle("night-theme", timing === "night");
    document.body.classList.remove("lamp-fade");
  }, 250);
}

document.addEventListener("visibilitychange", () => {
  if (!document.hidden) {
    dailyReset();
    showPage(current, false);
    announceStatus();
  }
});

/* ===== 初期表示 ===== */
const hour = new Date().getHours();
const initialTiming = hour < 15 ? "morning" : "night";
current = initialTiming;
showPage(initialTiming, false);
announceStatus();
</script>

</body>
</html>
